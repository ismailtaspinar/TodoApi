services:
  - type: web
    name: todo-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/v1/todos
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
