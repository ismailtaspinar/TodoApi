spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:todo_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
server:
  port: ${PORT:8080}